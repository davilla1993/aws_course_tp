AWSTemplateFormatVersion: '2010-09-09'
Description: TP AWS Lambda - Code Chargé depuis src/main.py
Parameters:
  Environment:
    Type: String
    Description: Nom de l'environnement (dev, staging, prod)
    Default: fgbossou
  BucketName:
    Type: String
    Description: Nom du bucket S3 pour stocker le code de la fonction Lambda
    Default: iabd-sourcecode-management-bucket
Resources:
  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
        - Effect: Allow
          Principal:
            Service:
            - lambda.amazonaws.com
          Action:
          - sts:AssumeRole
      ManagedPolicyArns:
      - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
      - PolicyName:
          Fn::Sub: ${Environment}-LambdaS3AccessPolicy
        PolicyDocument:
          Version: '2012-10-17'
          Statement:
          - Effect: Allow
            Action:
            - s3:GetObject
            - s3:PutObject
            Resource:
              Fn::Sub: arn:aws:s3:::${Environment}-${BucketName}/*
  LambdaTrigger:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName:
        Fn::Sub: ${Environment}-S3LambdaTrigger
      Handler: main.lambda_handler
      Role:
        Fn::GetAtt:
        - LambdaExecutionRole
        - Arn
      Runtime: python3.12
      Code:
        S3Bucket: iabd-sourcecode-management-bucket
        S3Key: bd6309c8fae1c59a658f9e83de7f85e1
  LambdaPermissionForS3:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName:
        Ref: LambdaTrigger
      Action: lambda:InvokeFunction
      Principal: s3.amazonaws.com
      SourceArn:
        Fn::Sub: arn:aws:s3:::${Environment}-${BucketName}
  S3Bucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName:
        Fn::Sub: ${Environment}-${BucketName}
      NotificationConfiguration:
        LambdaConfigurations:
        - Event: s3:ObjectCreated:*
          Function:
            Fn::GetAtt:
            - LambdaTrigger
            - Arn
